<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פרטי אשראי | פריינטה אקדמי</title>
    <meta name="description" content="טופס למילוי פרטי אשראי – פריינטה אקדמי">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="lion-logo.png">
    <link rel="stylesheet" href="credit.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <div class="card-wrapper">
            <!-- Credit Card Preview -->
            <div class="credit-card" id="creditCard">
                <div class="card-shine"></div>
                <div class="card-chip">
                    <div class="chip-line"></div>
                    <div class="chip-line"></div>
                    <div class="chip-line"></div>
                    <div class="chip-line"></div>
                </div>
                <div class="card-contactless">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M8.5 16.5a5 5 0 0 1 0-9"/>
                        <path d="M12 19a9 9 0 0 1 0-14"/>
                        <path d="M5 14a2 2 0 0 1 0-4"/>
                    </svg>
                </div>
                <div class="card-number" id="cardNumberDisplay">•••• •••• •••• ••••</div>
                <div class="card-details">
                    <div class="card-holder">
                        <span class="card-label">שם בעל הכרטיס</span>
                        <span class="card-value" id="cardHolderDisplay">שם מלא</span>
                    </div>
                    <div class="card-expiry">
                        <span class="card-label">תוקף</span>
                        <span class="card-value" id="cardExpiryDisplay">MM/YY</span>
                    </div>
                </div>
                <div class="card-type-logo" id="cardTypeLogo">
                    <svg viewBox="0 0 48 32" class="visa-logo">
                        <text x="50%" y="60%" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="Heebo, sans-serif">VISA</text>
                    </svg>
                </div>
            </div>

            <!-- Form -->
            <form class="form-card" id="creditForm" novalidate>
                <div class="form-header">
                    <div class="form-logo">
                        <img src="lion-logo.png" alt="Pariente Academy" class="brand-logo">
                    </div>
                    <h1>פרטי אשראי</h1>
                    <p>מלא את הפרטים הבאים לעדכון אמצעי התשלום</p>
                </div>

                <!-- Hidden Operation Type -->
                <input type="hidden" id="operationType" value="update">

                <!-- Full Name -->
                <div class="form-group" id="fullNameGroup">
                    <label for="fullName">שם מלא של המתאמן</label>
                    <div class="input-wrapper">
                        <input type="text" id="fullName" placeholder="ישראל ישראלי" required autocomplete="name">
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Card Number -->
                <div class="form-group" id="cardNumberGroup">
                    <label for="cardNumber">מספר כרטיס</label>
                    <div class="input-wrapper">
                        <input type="password" id="cardNumber" placeholder="0000 0000 0000 0000" required maxlength="19" inputmode="numeric" autocomplete="cc-number">
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="1" y="4" width="22" height="16" rx="3"/>
                                <line x1="1" y1="10" x2="23" y2="10"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Expiry & CVV Row -->
                <div class="form-row">
                    <div class="form-group" id="expiryGroup">
                        <label for="expiryDate">תוקף</label>
                        <div class="input-wrapper">
                            <input type="text" id="expiryDate" placeholder="MM/YY" required maxlength="5" inputmode="numeric" autocomplete="cc-exp">
                            <div class="input-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="3" y="4" width="18" height="18" rx="2"/>
                                    <line x1="16" y1="2" x2="16" y2="6"/>
                                    <line x1="8" y1="2" x2="8" y2="6"/>
                                    <line x1="3" y1="10" x2="21" y2="10"/>
                                </svg>
                            </div>
                        </div>
                    </div>
                    <div class="form-group" id="cvvGroup">
                        <label for="cvv">CVV</label>
                        <div class="input-wrapper">
                            <input type="password" id="cvv" placeholder="•••" required maxlength="4" inputmode="numeric" autocomplete="cc-csc">
                            <div class="input-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="3" y="11" width="18" height="11" rx="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Legal Checkboxes -->
                <div class="legal-section">
                    <div class="checkbox-group" id="consent1Group">
                        <label class="checkbox-label" for="consent1">
                            <input type="checkbox" id="consent1" required>
                            <span class="checkbox-custom">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                    <polyline points="20 6 9 17 4 12"/>
                                </svg>
                            </span>
                            <span class="checkbox-text">אני מאשר/ת בזאת ל־<strong>פריינטה אקדמי</strong> לחייב את כרטיס האשראי שלי בהתאם לפרטי העסקה או השירות שסוכמו בינינו. ידוע לי כי החיוב יתבצע בהתאם לסכום, למועדים ולתנאים שסוכמו. במקרה שטופס זה נועד לעדכון פרטי כרטיס אשראי בלבד, אני מאשר/ת ל־<strong>פריינטה אקדמי</strong> להחליף את פרטי הכרטיס הקיימים בפרטים שמסרתי בטופס זה, ולהמשיך לבצע חיובים בהתאם להסכם או להתחייבות הקיימת בינינו.</span>
                        </label>
                    </div>

                    <div class="checkbox-group" id="consent2Group">
                        <label class="checkbox-label" for="consent2">
                            <input type="checkbox" id="consent2" required>
                            <span class="checkbox-custom">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                    <polyline points="20 6 9 17 4 12"/>
                                </svg>
                            </span>
                            <span class="checkbox-text">אני מצהיר/ה כי אני בעל/ת הכרטיס או מורשה להשתמש בו, וכי כל הפרטים שמסרתי בטופס זה נכונים ומדויקים. ידוע לי כי החיוב יתבצע בהתאם לדין ולתנאי העסקה שסוכמו עם העסק.</span>
                        </label>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">שליחה</span>
                    <span class="btn-loader">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="15"/>
                        </svg>
                    </span>
                    <span class="btn-success">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </span>
                </button>

                <div class="security-note">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                    <span>הנתונים שלך מוגנים ומוצפנים בתקן SSL</span>
                </div>
                <p style="font-size: 0.85rem; color: #666; text-align: center; margin-top: 8px;">פרטי הכרטיס ישומשו אך ורק לשם הפעולה הנ״ל.</p>
            </form>
        </div>
    </main>

    <!-- Success Modal -->
    <div class="modal-overlay" id="successModal">
        <div class="modal-card">
            <div class="modal-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="16 8 10 16 7 13"/>
                </svg>
            </div>
            <h2>הבקשה התקבלה בהצלחה!</h2>
            <p style="line-height: 1.5; margin-bottom: 20px;">פרטי הכרטיס יעודכנו בימים הקרובים.<br>במידה ותהיה בעיה ניצור איתך קשר.</p>
            <a href="index.html" class="modal-btn" style="text-decoration: none; display: inline-block;">חזרה לפורטל</a>
        </div>
    </div>

    <!-- Floating WhatsApp Widget -->
    <a href="https://wa.me/0547468505" target="_blank" rel="noopener" class="whatsapp-float" aria-label="צרו קשר בוואטסאפ" style="position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; background-color: #25D366; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3); z-index: 1000; transition: transform 0.3s ease;">
        <svg viewBox="0 0 24 24" fill="currentColor" style="width: 32px; height: 32px;"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.030-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </a>

    <script src="credit.js"></script>
</body>
</html>
